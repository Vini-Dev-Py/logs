services:
  traefik:
    image: traefik:v3.1
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: logs
      POSTGRES_PASSWORD: logs
      POSTGRES_DB: logs
    ports:
      - "5432:5432"
    volumes:
      - ./infra/migrations:/workspace/infra/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logs"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 15s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.11.1
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -s http://localhost:9200 | grep -q 'cluster_name'"]
      interval: 10s
      timeout: 10s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.http.routers.opensearch.rule=PathPrefix(`/opensearch`)
      - traefik.http.routers.opensearch.middlewares=opensearch-strip
      - traefik.http.middlewares.opensearch-strip.stripprefix.prefixes=/opensearch
      - traefik.http.routers.opensearch.entrypoints=web
      - traefik.http.services.opensearch.loadbalancer.server.port=9200

  cassandra:
    image: cassandra:5.0
    ports:
      - "9042:9042"
    volumes:
      - ./infra/cassandra:/workspace/infra/cassandra:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'describe keyspaces;' | cqlsh -u cassandra -p cassandra || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 15

  cassandra-web:
    image: ipushc/cassandra-web
    environment:
      CASSANDRA_HOSTS: cassandra
      CASSANDRA_PORT: 9042
    ports:
      - "3000:8083"
    depends_on:
      cassandra:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.cassandra-web.rule=PathPrefix(`/cassandra`)
      - traefik.http.routers.cassandra-web.entrypoints=web
      - traefik.http.services.cassandra-web.loadbalancer.server.port=8083

  logs-bff:
    build:
      context: .
      dockerfile: ./apps/logs-bff/Dockerfile
    environment:
      PORT: 8081
      DATABASE_URL: postgres://logs:logs@postgres:5432/logs?sslmode=disable
      JWT_SECRET: super-secret
      QUERY_URL: http://logs-query:8084
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.logs-bff.rule=PathPrefix(`/api`)
      - traefik.http.routers.logs-bff.entrypoints=web
      - traefik.http.services.logs-bff.loadbalancer.server.port=8081

  logs-ingest:
    build:
      context: .
      dockerfile: ./apps/logs-ingest/Dockerfile
    environment:
      PORT: 8082
      DATABASE_URL: postgres://logs:logs@postgres:5432/logs?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      replicas: 1
    labels:
      - traefik.enable=true
      - traefik.http.routers.logs-ingest.rule=PathPrefix(`/ingest`)
      - traefik.http.routers.logs-ingest.entrypoints=web
      - traefik.http.services.logs-ingest.loadbalancer.server.port=8082

  logs-worker:
    build:
      context: .
      dockerfile: ./apps/logs-worker/Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CASSANDRA_HOSTS: cassandra
    depends_on:
      rabbitmq:
        condition: service_healthy
      cassandra:
        condition: service_healthy
    deploy:
      replicas: 1

  logs-query:
    build:
      context: .
      dockerfile: ./apps/logs-query/Dockerfile
    environment:
      PORT: 8084
      CASSANDRA_HOSTS: cassandra
    depends_on:
      cassandra:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.logs-query.rule=PathPrefix(`/query`)
      - traefik.http.routers.logs-query.entrypoints=web
      - traefik.http.services.logs-query.loadbalancer.server.port=8084

  web:
    build: ./apps/web
    environment:
      VITE_API_BASE: /api
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=PathPrefix(`/`)
      - traefik.http.routers.web.entrypoints=web
      - traefik.http.services.web.loadbalancer.server.port=5173
